<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e2a38, #2c3e50);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 5px #4CAF50;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #4CAF50;
            text-decoration: none;
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <form method="post">
        <input type="text" name="username" placeholder="Username" required>

        <div class="password-box">
            <input type="password" name="password" id="password" placeholder="Password" required>

            <span class="toggle" onclick="togglePassword()">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"></svg>
            </span>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don’t have an account? <a href="/signup">Sign up</a>
    </div>
</div>

<script>
const eye = `
<path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/>
<circle cx="12" cy="12" r="3"/>
`;

const eyeSlash = `
<path d="M3 3l18 18"/>
<path d="M10.58 10.58A3 3 0 0012 15a3 3 0 002.42-4.42"/>
<path d="M9.88 4.24A9.77 9.77 0 0112 4c6 0 10 8 10 8a17.73 17.73 0 01-3.06 4.31"/>
<path d="M6.53 6.53A17.73 17.73 0 002 12s4 8 10 8a9.77 9.77 0 005.47-1.53"/>
`;

// default icon
document.getElementById("eyeIcon").innerHTML = eyeSlash;

function togglePassword() {
    let p = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if (p.type === "password") {
        p.type = "text";
        icon.innerHTML = eye;
    } else {
        p.type = "password";
        icon.innerHTML = eyeSlash;
    }
}
</script>

</body>
</html>
