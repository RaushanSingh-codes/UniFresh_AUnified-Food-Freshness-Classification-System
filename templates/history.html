<!DOCTYPE html>
<html>
<head>
<title>Prediction History</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1e2a38,#2c3e50);
    color:white;
    text-align:center;
}

/* HEADER */
.header{
    margin-top:30px;
}

.header h1{
    font-size:30px;
    margin-bottom:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    padding:40px 60px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:18px;
    padding:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
    height:320px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* IMAGE */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;
}

/* TEXT */
.fresh{color:lightgreen;}
.spoiled{color:#ff4d4d;}

.conf{
    opacity:0.8;
}

/* 🔥 FLOATING BACK BUTTON */
.floating-back{
    position:fixed;
    bottom:30px;
    right:30px;

    background:linear-gradient(135deg,#1f3b57,#2c5364);
    color:white;

    padding:12px 20px;
    border-radius:30px;

    text-decoration:none;
    font-size:14px;
    font-weight:500;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.floating-back:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<div class="header">
    <h1>📜 Prediction History</h1>
</div>

<div class="grid">

{% for item in history %}

<div class="card">

    <img src="{{item.image}}">

    <div>
        <h3 class="{{ item.prediction | lower }}">
            {{ item.prediction }}
        </h3>

        <p class="conf">
            Confidence: {{ item.confidence }}%
        </p>
    </div>

</div>

{% endfor %}

</div>

<!-- 🔥 FLOATING BACK BUTTON -->
<a href="/" class="floating-back">
    ⬅ Back
</a>

</body>
</html>
